<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{manage/fragments :: head('后台登录')}"></head>
<body class="login-page">
<main class="login-shell">
    <section class="login-card">
        <p class="eyebrow">Web 管理面板</p>
        <h1>登录本地后台</h1>
        <p class="intro">这个页面用于本机联调、查看和维护后端数据，账号直接复用 App 后端里的用户数据。</p>

        <div th:replace="~{manage/fragments :: flash(${successMessage}, ${errorMessage})}"></div>

        <form th:action="@{/manage/login}" th:object="${loginForm}" method="post" class="form-stack">
            <label class="field">
                <span>用户名</span>
                <input type="text" th:field="*{username}" placeholder="demo" autocomplete="username">
            </label>
            <label class="field">
                <span>密码</span>
                <input type="password" th:field="*{password}" placeholder="123456" autocomplete="current-password">
            </label>

            <button class="button" type="submit">进入管理面板</button>
        </form>

        <div class="login-tip">
            <strong>默认账号</strong>
            <span>`demo / 123456`</span>
        </div>
    </section>
</main>
</body>
</html>
